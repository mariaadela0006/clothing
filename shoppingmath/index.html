
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Fashion - Classroom Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap');

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #fce4ec;
            margin: 0;
            overflow: hidden; 
            user-select: none;
            height: 100vh;
        }

        h1, h2, .font-title {
            font-family: 'Fredoka One', cursive;
        }

        .pos-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .menu-item-card {
            transition: all 0.1s ease;
            cursor: pointer;
            border-width: 4px;
        }

        .menu-item-card:active {
            transform: scale(0.95);
        }

        .text-classroom-label {
            font-size: 1.35rem; 
            line-height: 1.2;
            font-weight: 800;
        }

        .text-classroom-price {
            font-size: 2.75rem; 
            letter-spacing: -0.02em;
        }

        .order-row {
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .success-overlay, .timeout-overlay {
            background: rgba(255, 255, 255, 0.98);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 500;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .timer-warning {
            color: #b71c1c;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 0.75rem;
            height: 100%;
        }
        
        #order-list::-webkit-scrollbar {
            width: 10px;
        }
        #order-list::-webkit-scrollbar-thumb {
            background: #f06292;
            border-radius: 10px;
        }

        .price-tag {
            text-shadow: 2px 2px 0px rgba(255,255,255,1);
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.15));
        }

        .icon-svg {
            max-width: 85%;
            max-height: 85%;
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>

<div class="pos-container p-4">
    <!-- Header Section -->
    <div class="flex justify-between items-center bg-white rounded-3xl p-6 shadow-xl mb-4 border-b-8 border-pink-200">
        <div class="flex flex-col">
            <span class="text-pink-500 font-black uppercase text-xl tracking-widest text-shadow-sm">Target Total</span>
            <div id="target-amount" class="text-7xl lg:text-8xl font-title text-pink-600 leading-none">$0</div>
        </div>
        
        <div class="flex flex-col items-center">
            <span class="text-gray-500 font-black uppercase text-xl tracking-widest" id="q-count">Level 1/15</span>
            <div id="timer-display" class="text-7xl lg:text-8xl font-title text-gray-800 leading-none">30s</div>
        </div>

        <div class="bg-pink-100 px-8 py-4 rounded-2xl flex items-center gap-4 border-2 border-pink-200">
            <span class="text-6xl">🛍️</span>
            <span id="score-display" class="text-7xl font-title text-pink-700">0</span>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex flex-1 gap-6 overflow-hidden mb-2">
        
        <!-- Left: Shop Grid -->
        <div id="shop-grid" class="flex-[3] grid-container">
            <!-- Items injected by JS -->
        </div>

        <!-- Right: Checkout Counter -->
        <div class="flex-[1.3] flex flex-col bg-white rounded-3xl shadow-2xl border-4 border-pink-100 overflow-hidden">
            <div class="bg-gray-800 p-4 text-white font-title text-center text-2xl tracking-[0.2em]">
                YOUR BAG
            </div>
            
            <div id="order-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
                <div class="text-center text-gray-400 mt-20 italic text-3xl font-bold">Shopping Bag Empty</div>
            </div>

            <div class="p-6 bg-pink-50 border-t-4 border-pink-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-2xl font-black text-gray-600 uppercase">Current Total</span>
                    <span id="current-total" class="text-7xl font-title text-gray-900 price-tag">$0</span>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="clearOrder()" class="bg-white border-4 border-pink-200 text-pink-500 font-black py-5 rounded-2xl text-2xl hover:bg-pink-100 transition active:scale-95">
                        RESET
                    </button>
                    <button onclick="submitOrder()" class="bg-pink-600 hover:bg-pink-700 text-white font-title text-4xl py-5 rounded-2xl shadow-lg transform active:scale-95 transition">
                        PAY
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Success Overlay -->
<div id="success-overlay" class="success-overlay">
    <div class="text-9xl mb-8">💎</div>
    <h2 id="feedback-title" class="text-9xl font-title text-pink-500 mb-4">CORRECT!</h2>
    <p class="text-5xl font-bold text-gray-600" id="success-message">Payment successful</p>
</div>

<!-- Time Out Overlay -->
<div id="timeout-overlay" class="timeout-overlay">
    <div class="text-9xl mb-8">⏰</div>
    <h2 class="text-9xl font-title text-red-500 mb-4">TIME'S UP!</h2>
    <p class="text-4xl font-bold text-gray-600 mb-12 uppercase tracking-wide">Don't worry, you can try again!</p>
    <button onclick="retryLevel()" class="bg-pink-600 text-white px-20 py-8 rounded-full font-title text-5xl hover:bg-pink-700 transition transform hover:scale-105 shadow-2xl">
        TRY AGAIN
    </button>
</div>

<!-- Game Over Overlay -->
<div id="game-over" class="hidden fixed inset-0 bg-gray-900 z-[200] flex flex-col items-center justify-center text-white text-center p-6">
    <h2 class="text-8xl font-title mb-8 text-pink-400">SESSION OVER</h2>
    <p class="text-6xl mb-16 uppercase font-bold tracking-widest">Total Levels Cleared: <span id="final-score" class="font-title text-white">0/15</span></p>
    <button onclick="location.reload()" class="bg-white text-pink-600 px-20 py-10 rounded-full font-title text-5xl hover:bg-pink-100 transition transform hover:scale-110 shadow-2xl">
        PLAY AGAIN
    </button>
</div>

<div id="toast" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-red-700 text-white px-16 py-10 rounded-3xl font-black text-5xl shadow-2xl opacity-0 transition-opacity pointer-events-none z-[250] border-8 border-white">
    Not Quite!
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type = 'sine', duration = 0.1) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const playCorrect = () => { playSound(600, 'sine', 0.2); setTimeout(() => playSound(800, 'sine', 0.3), 100); };
    const playWrong = () => { playSound(150, 'sawtooth', 0.4); };
    const playClick = () => { playSound(1000, 'sine', 0.05); };

    // Polo Icon
    const poloIcon = `<svg viewBox="0 0 512 512" class="icon-svg">
        <path d="M135,500 L377,500 L377,160 L410,180 L490,260 L440,310 L395,275 L395,145 L320,50 L192,50 L117,145 L117,275 L72,310 L22,260 L102,180 L135,160 Z" fill="#4fc3f7" stroke="#1a237e" stroke-width="12" stroke-linejoin="round"/>
        <path d="M192,50 L256,180 L320,50" fill="#fb8c00" stroke="#1a237e" stroke-width="12" stroke-linejoin="round"/>
        <path d="M192,50 L140,180 L256,180" fill="#fb8c00" stroke="#1a237e" stroke-width="12" stroke-linejoin="round"/>
        <path d="M320,50 L372,180 L256,180" fill="#fb8c00" stroke="#1a237e" stroke-width="12" stroke-linejoin="round"/>
        <path d="M192,50 Q256,80 320,50 L256,60 Z" fill="#ef6c00"/>
        <rect x="242" y="160" width="28" height="90" fill="#ffffff" stroke="#1a237e" stroke-width="8"/>
        <circle cx="256" cy="185" r="4" fill="#1a237e"/>
        <circle cx="256" cy="215" r="4" fill="#1a237e"/>
        <path d="M35,275 L75,315" stroke="#fb8c00" stroke-width="14" stroke-linecap="butt"/>
        <path d="M435,315 L475,275" stroke="#fb8c00" stroke-width="14" stroke-linecap="butt"/>
    </svg>`;
    
    // Trousers Icon
    const trousersIcon = `<svg viewBox="0 0 64 64" class="icon-svg">
        <path d="M18,6 L46,6 L51,58 L33,58 L32,32 L31,58 L13,58 Z" fill="#000000" stroke="#333" stroke-width="1"/>
        <path d="M18,6 L46,6 L48,16 L16,16 Z" fill="#111"/>
        <line x1="24" y1="20" x2="22" y2="50" stroke="#333" stroke-width="1"/>
        <line x1="40" y1="20" x2="42" y2="50" stroke="#333" stroke-width="1"/>
    </svg>`;

    // Custom Blouse Icon
    const blouseIcon = `<svg viewBox="0 0 200 200" class="icon-svg">
        <path d="M50,180 L150,180 L165,80 L180,100 L195,85 L160,40 L140,50 L100,65 L60,50 L40,40 L5,85 L20,100 L35,80 Z" fill="#ff7043" stroke="#4a1a10" stroke-width="6" stroke-linejoin="round"/>
        <path d="M50,180 Q100,195 150,180" fill="none" stroke="#4a1a10" stroke-width="4"/>
        <path d="M60,50 Q65,85 100,90 Q135,85 140,50" fill="#ffffff" stroke="#4a1a10" stroke-width="4"/>
        <path d="M60,50 Q75,35 100,45 Q125,35 140,50" fill="#ffffff" stroke="#4a1a10" stroke-width="4"/>
        <path d="M75,55 L75,85" stroke="#4a1a10" stroke-width="2" opacity="0.3"/>
        <path d="M90,58 L90,88" stroke="#4a1a10" stroke-width="2" opacity="0.3"/>
        <path d="M110,58 L110,88" stroke="#4a1a10" stroke-width="2" opacity="0.3"/>
        <path d="M125,55 L125,85" stroke="#4a1a10" stroke-width="2" opacity="0.3"/>
        <rect x="94" y="90" width="12" height="90" fill="#ff8a65" stroke="#4a1a10" stroke-width="2"/>
        <circle cx="100" cy="105" r="3" fill="#4a1a10"/>
        <circle cx="100" cy="130" r="3" fill="#4a1a10"/>
        <circle cx="100" cy="155" r="3" fill="#4a1a10"/>
        <path d="M10,80 L25,95" stroke="#4a1a10" stroke-width="4"/>
        <path d="M175,95 L190,80" stroke="#4a1a10" stroke-width="4"/>
    </svg>`;

    // Updated Belt Icon with centered buckle
    const beltIcon = `<svg viewBox="0 0 64 64" class="icon-svg">
        <rect x="6" y="24" width="52" height="12" rx="2" fill="#4b2c20" stroke="#2a1810" stroke-width="2"/>
        <rect x="25" y="20" width="14" height="20" rx="2" fill="#ffd700" stroke="#b8860b" stroke-width="2"/>
        <rect x="29" y="25" width="6" height="10" rx="1" fill="#4b2c20"/>
    </svg>`;

    const clothesItems = [
        { name: 'Cap', icon: '🧢', base: 10, color: 'bg-blue-100', text: 'text-blue-900', border: 'border-blue-400' },
        { name: 'Socks', icon: '🧦', base: 5, color: 'bg-purple-100', text: 'text-purple-900', border: 'border-purple-400' },
        { name: 'Gloves', icon: '🧤', base: 15, color: 'bg-green-100', text: 'text-green-900', border: 'border-green-400' },
        { name: 'Scarf', icon: '🧣', base: 25, color: 'bg-red-100', text: 'text-red-900', border: 'border-red-400' },
        { name: 'Sunglasses', icon: '🕶️', base: 50, color: 'bg-gray-100', text: 'text-gray-900', border: 'border-gray-500' },
        { name: 'Belt', icon: beltIcon, base: 30, color: 'bg-orange-100', text: 'text-orange-900', border: 'border-orange-400', isSvg: true },
        { name: 'Polo Shirt', icon: poloIcon, base: 80, color: 'bg-teal-100', text: 'text-teal-900', border: 'border-teal-400', isSvg: true },
        { name: 'Blouse', icon: blouseIcon, base: 120, color: 'bg-pink-100', text: 'text-pink-900', border: 'border-pink-400', isSvg: true },
        { name: 'Trousers', icon: trousersIcon, base: 200, color: 'bg-slate-200', text: 'text-slate-900', border: 'border-slate-500', isSvg: true },
        { name: 'Boots', icon: '🥾', base: 350, color: 'bg-amber-100', text: 'text-amber-900', border: 'border-amber-400' }
    ];

    let currentQuestion = 1;
    let score = 0;
    let targetAmount = 0;
    let currentTotal = 0;
    let timer = 30;
    let timerInterval = null;
    let gameActive = true;
    let currentOrder = {};
    let itemPrices = {};

    function createShopGrid() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        clothesItems.forEach(item => {
            const btn = document.createElement('button');
            btn.onclick = () => addToOrder(item.name);
            btn.className = `menu-item-card ${item.color} ${item.border} p-3 rounded-3xl shadow-xl flex flex-col items-center justify-between h-full hover:scale-[1.03] active:bg-white overflow-hidden`;
            
            const iconContainer = document.createElement('div');
            iconContainer.className = "flex-1 flex items-center justify-center w-full h-full relative";
            if (item.isSvg) {
                iconContainer.innerHTML = item.icon;
            } else {
                iconContainer.innerHTML = `<span class="text-7xl lg:text-8xl drop-shadow-xl">${item.icon}</span>`;
            }
            
            const labelContainer = document.createElement('div');
            labelContainer.className = "flex flex-col items-center pb-2 w-full";
            labelContainer.innerHTML = `
                <span class="text-classroom-label text-gray-800 uppercase font-black">${item.name}</span>
                <span id="price-${item.name.replace(/\s+/g, '-')}" class="text-classroom-price font-title ${item.text} price-tag">$0</span>
            `;
            
            btn.appendChild(iconContainer);
            btn.appendChild(labelContainer);
            grid.appendChild(btn);
        });
    }

    function initQuestion() {
        if (currentQuestion > 15) {
            endGame();
            return;
        }

        let multiplier = 1;
        if (currentQuestion > 5) multiplier = 5;
        if (currentQuestion > 10) multiplier = 15;

        clothesItems.forEach(item => {
            let variance = Math.floor(Math.random() * (currentQuestion * 2)) * 5;
            itemPrices[item.name] = (item.base * multiplier) + variance;
            const priceEl = document.getElementById(`price-${item.name.replace(/\s+/g, '-')}`);
            if(priceEl) priceEl.innerText = `$${itemPrices[item.name].toLocaleString()}`;
        });

        let possibleTotal = 0;
        const shuffled = [...clothesItems].sort(() => 0.5 - Math.random());
        let numDistinct = currentQuestion < 7 ? 2 : (currentQuestion < 12 ? 3 : 4);

        for (let i = 0; i < numDistinct; i++) {
            let qty = Math.floor(Math.random() * 2) + 1;
            possibleTotal += (itemPrices[shuffled[i].name] * qty);
        }

        const matchesAnySingleItem = clothesItems.some(item => itemPrices[item.name] === possibleTotal);
        if (matchesAnySingleItem) possibleTotal += itemPrices['Socks'];

        targetAmount = possibleTotal;
        document.getElementById('target-amount').innerText = `$${targetAmount.toLocaleString()}`;
        document.getElementById('q-count').innerText = `Level ${currentQuestion}/15`;
        
        clearOrder();
        resetTimer();
    }

    function resetTimer() {
        timer = 30;
        updateTimerUI();
        clearInterval(timerInterval);
        timerInterval = null;
        gameActive = true;
    }

    function updateTimerUI() {
        const display = document.getElementById('timer-display');
        display.innerText = `${timer}s`;
        if (timer <= 10) display.classList.add('timer-warning');
        else display.classList.remove('timer-warning');
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            timer--;
            updateTimerUI();
            if (timer <= 0) {
                clearInterval(timerInterval);
                handleTimeout();
            }
        }, 1000);
    }

    function handleTimeout() {
        gameActive = false;
        playWrong();
        document.getElementById('timeout-overlay').style.display = 'flex';
    }

    function retryLevel() {
        document.getElementById('timeout-overlay').style.display = 'none';
        clearOrder();
        resetTimer();
    }

    function addToOrder(name) {
        if (!gameActive) return;
        playClick();
        startTimer();
        currentOrder[name] = (currentOrder[name] || 0) + 1;
        renderOrder();
    }

    function removeFromOrder(name) {
        if (!gameActive) return;
        playClick();
        if (currentOrder[name] > 0) {
            currentOrder[name]--;
            if (currentOrder[name] === 0) delete currentOrder[name];
        }
        renderOrder();
    }

    function renderOrder() {
        const container = document.getElementById('order-list');
        container.innerHTML = '';
        currentTotal = 0;

        const entries = Object.entries(currentOrder);
        if (entries.length === 0) {
            container.innerHTML = '<div class="text-center text-gray-400 mt-20 italic text-3xl font-bold">Shopping Bag Empty</div>';
            document.getElementById('current-total').innerText = '$0';
            return;
        }

        entries.forEach(([name, qty]) => {
            const item = clothesItems.find(f => f.name === name);
            const lineTotal = itemPrices[name] * qty;
            currentTotal += lineTotal;

            const div = document.createElement('div');
            div.className = "order-row flex justify-between items-center bg-white p-3 rounded-3xl border-4 border-gray-100 shadow-md";
            div.innerHTML = `
                <div class="flex items-center gap-3">
                    <div class="w-16 h-16 flex items-center justify-center bg-gray-50 rounded-2xl overflow-hidden p-1 border border-gray-100">
                        ${item.isSvg ? item.icon : '<span class="text-4xl">' + item.icon + '</span>'}
                    </div>
                    <div class="flex flex-col">
                        <span class="text-xl font-black text-gray-800 leading-tight">${name}</span>
                        <span class="text-lg text-pink-600 font-black">${qty} x $${itemPrices[name].toLocaleString()}</span>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-2xl font-title text-gray-900">$${lineTotal.toLocaleString()}</span>
                    <button onclick="removeFromOrder('${name}')" class="bg-red-100 text-red-600 w-10 h-10 rounded-full flex items-center justify-center text-xl font-black hover:bg-red-600 hover:text-white transition">✕</button>
                </div>
            `;
            container.appendChild(div);
        });
        document.getElementById('current-total').innerText = `$${currentTotal.toLocaleString()}`;
    }

    function clearOrder() {
        currentOrder = {};
        renderOrder();
    }

    function submitOrder() {
        if (!gameActive) return;
        if (currentTotal === targetAmount) {
            handleSuccess();
        } else {
            handleFailure();
        }
    }

    function handleSuccess() {
        gameActive = false;
        clearInterval(timerInterval);
        score++;
        document.getElementById('score-display').innerText = score;
        playCorrect();
        
        const feedbackMsg = document.getElementById('success-message');
        const phrases = ["Great Math!", "Boutique Boss!", "Perfect Checkout!", "Math Genius!", "Style & Logic!"];
        feedbackMsg.innerText = phrases[Math.floor(Math.random() * phrases.length)];
        
        const overlay = document.getElementById('success-overlay');
        overlay.style.display = 'flex';
        setTimeout(() => {
            overlay.style.display = 'none';
            currentQuestion++;
            initQuestion();
        }, 1500);
    }

    function handleFailure() {
        playWrong();
        const diff = Math.abs(currentTotal - targetAmount);
        showToast(currentTotal > targetAmount ? `Over by $${diff.toLocaleString()}` : `Under by $${diff.toLocaleString()}`);
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }

    function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        const gameOver = document.getElementById('game-over');
        document.getElementById('final-score').innerText = `${score}/15`;
        gameOver.classList.remove('hidden');
    }

    window.onload = () => {
        createShopGrid();
        initQuestion();
    };
</script>

</body>
</html>
